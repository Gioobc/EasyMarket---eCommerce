name: EAS Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Run EAS build
        run: npx eas build --platform ${{ inputs.platform }} --profile release --non-interactive